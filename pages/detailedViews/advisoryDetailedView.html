<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="../../scripts/components.js" defer></script>
    <script src="../../scripts/detailedViews/advisoryDetailedView.js" defer></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <title>Client Detail</title>
</head>
<body>
    <main-header></main-header>

    <h3 class="h1 p-4 text-dark text-center" id="page-header">Advisory Service Info</h3>

    <div class="container-fluid">
        <div class="row p-8"></div>
    </div>

    <div class="container-fluid">
        <div class="row justify-content-center">
            <div class="col-5">
                <div class="card shadow-sm text-center">
                    <div class="card-body">
                        <h5 class="card-title" id="name-holder"></h5>
                        <h6 class="card-subtitle mb-3 text-muted" id="service-type-holder"></h6>

                        <div class="row mb-2">
                        <div class="col-4 fw-bold">Delivery Format:</div>
                        <div class="col-8" id="format-holder"></div>
                        </div>

                        <div class="row mb-2">
                        <div class="col-4 fw-bold">Annual Fee:</div>
                        <div class="col-8" id="fee-holder"></div>
                        </div>

                        <div class="row mb-2">
                        <div class="col-4 fw-bold">Status:</div>
                        <div class="col-8" id="status-holder"></div>
                        </div>

                        <div class="row mb-2">
                        <div class="col-4 fw-bold">Active Clients:</div>
                        <div class="col-8" id="client-count-holder"></div>
                        </div>
                        </div>
                    </div>
            </div>


            <div class="col-6">
                <h2>Clients using service:</h1>
  
                <table id="advisory-client-table" class="table table-light table-hover my-5">
                    <thead class="text-center">
                        <tr>
                            <th>Client Name</th>
                            <th>Email</th> 
                            <th>Phone</th> 
                            <th>Tier</th>
                        </tr>
                    </thead>
                    <tbody id="advisory-client-table-body" class="text-center">
                        
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    
        <!-- including bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
