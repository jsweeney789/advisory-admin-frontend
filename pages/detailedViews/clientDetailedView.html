<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="../../scripts/components.js" defer></script>
    <script src="../../scripts/detailedViews/clientDetailedView.js" defer></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <title>Client Detail</title>
</head>
<body>
    <main-header></main-header>

    <h1 class="h1 p-4 text-dark text-center" id="page-header">Client Info</h3>

    <div class="container-fluid">
        <div class="row p-8"></div>
    </div>

    <div class="container-fluid">
        <div class="row justify-content-center">
            <div class="col-5">
                <div class="card shadow-sm text-center  ">
                    <div class="card-body">
                        <h5 class="card-title" id="name-holder">John Doe</h5>
                        <h6 class="card-subtitle mb-3 text-muted" id="tier-holder">Premium Tier</h6>

                        <div class="row mb-2">
                        <div class="col-4 fw-bold">Email:</div>
                        <div class="col-8" id="email-holder">john@email.com</div>
                        </div>

                        <div class="row mb-2">
                        <div class="col-4 fw-bold">Phone:</div>
                        <div class="col-8" id="phone-holder">(123) 456-7890</div>
                        </div>

                        <div class="row mb-2">
                        <div class="col-4 fw-bold">Net Worth:</div>
                        <div class="col-8" id="networth-holder">$1M–$5M</div>
                        </div>

                        <div class="row mb-2">
                        <div class="col-4 fw-bold">Annual Fee Obligations:</div>
                        <div class="col-8" id="obligation-holder">$12,000</div>
                        </div>

                        <div class="row mb-2">
                        <div class="col-4 fw-bold">Services Using:</div>
                        <div class="col-8" id="service-count-holder">3</div>
                        </div>
                        </div>
                    </div>
            </div>


            <div class="col-6">
                <h2>Services Client is Engaged With:</h1>
  
                <table id="client-engagement-table" class="table table-light table-hover my-5">
                    <thead class="text-center">
                        <tr>
                            <th>Advisory Service Name</th>
                            <th>Start Date</th> 
                            <th>Status</th> 
                            <th>Annual Fee</th>
                        </tr>
                    </thead>
                    <tbody id="client-engagement-table-body" class="text-center">
                        <!-- client data will be added by the JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    
        <!-- including bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
