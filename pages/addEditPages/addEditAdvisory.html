<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- including bootstrap CSS --> 
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- including scripts -->
    <script src="../../scripts/components.js" defer></script>
    <script src="../../scripts/addEditPages/addEditAdvisory.js" defer></script>
    <title>Add New Advisory Service</title>
</head>
<body>
    <main-header></main-header>
    
    <h3 class="h3 p-4 text-dark text-center" id="form-header">New Advisory Service</h3>

<form id="advisory-form">

    
<div class="container-fluid">
    <div class="row mb-3 justify-content-center">

        <div class="col-5">
            <div class="mx-1"> 
                <label for="new-advisory-name" class="form-label text-dark">Advisory Service Name</label>
                <input type="text" class="form-control" id="new-advisory-name" name="new-advisory-name" placeholder="ex: &quot;Business Advisory Service&quot;">
            </div>
        </div>

        <div class="col-5">

            <div class="mx-1">
                <label for="new-service-type" class="form-label text-dark">Service Type</label>
                <select id="new-service-type" class="form-select" name="new-service-type" aria-label="Service Type Form Select">
                    <option selected>Select Service</option>
                
                    <option value="BUDGETING">1. Budgeting</option>
                    <option value="CASH_FLOW_ANALYSIS">2. Cash Flow Analysis</option>
                    <option value="DEBT_MANAGEMENT">3. Debt Management</option>
                    <option value="ESTATE_PLANNING">4. Estate Planning</option>
                    <option value="INVESTMENT_MANAGEMENT">5. Investment Management</option>
                    <option value="RETIREMENT_PLANNING">6. Retirement Planning</option>
                    <option value="RISK_MNGMENT_INSURANCE">7. Risk Management and Insurance</option>
                    <option value="TAX_PLANNING">8. Tax Planning</option>
                    
                </select>
            </div>
        </div>
    </div>
</div>
<div class="container-fluid">
    <div class="row mb-3 justify-content-center">
        <div class="col-5">
        
            <div class="mx-1">
                <label for="new-delivery-format" class="form-label text-dark">Delivery Format</label>
                <select id="new-delivery-format" class="form-select" name="new-delivery-format" style="width:100%;"aria-label="Delivery Format Form Select">
                    <option selected>Select Format</option>
                    <option value="IN_PERSON">In-Person</option> 
                    <option value="HYBRID">Hybrid</option>
                    <option value="VIRTUAL">Virtual</option>
                </select>
            </div>
        </div>
        
        <div class="col-4">  
            <div class="mx-1"> 
                <label for="new-annual-fee" class="form-label text-dark">Annual Fee</label>
                <input type="text" class="form-control" id="new-annual-fee" name="new-annual-fee" placeholder="ex: &quot;500&quot;">
            </div>
        </div>
        <div class="col-1"> 
            <div class="mx-1 pt-4"> 
                <input type="checkbox" class="btn-check" id="isActive-checkbox" name="isActive-checkbox" autocomplete="off">
                <label class="btn btn-outline-primary" for="isActive-checkbox">Active?</label>
            </div>
        </div>
    </div>
</div>
<div class="container-fluid">
  <div class="row justify-content-center">
      <div class="col-2">
          <button type="submit" id="advisory-submit-button" class="btn btn-success mx-1">Submit</button>
      </div>
    </div>
</div>
</form>
    
</body>
</html>
