<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- including bootstrap CSS --> <!-- TODO: implement better way of doing this for all pages -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- including scripts -->
    <script src="../../scripts/components.js" defer></script>
    <script src="../../scripts/addEditPages/addEditClient.js" defer></script>
    <title>Add New Client</title>
</head>
<body>
    <main-header></main-header>
    <form id="client-form"> 

        <h3 class="h3 p-4 text-dark text-center" id="form-header">New Client</h3>

        <!-- TODO: the submit button doesn't work for some reason, need to test -->
    
<div class="container-fluid ">
    <div class="row mb-3 justify-content-center ">

        <div class="col-3">
            <label class="form-label fw-bold">Name</label>
            <div class="mx-1"> 
                <label for="new-client-first" class="form-label text-dark">Client First Name</label>
                <input type="text" class="form-control" id="new-client-first" name="new-client-first" placeholder="ex: &quot;John&quot;">
            </div>
        </div>

        <div class="col-3">
            <label class="form-label fw-bold">Contact Information</label>
            <div class="mx-1"> 
                <label for="new-client-phone" class="form-label text-dark">Client Phone #</label>
                <input type="text" class="form-control" id="new-client-phone" name="new-client-phone" placeholder="1-###-###-####">
            </div>
            
        </div>

        <div class="col-3">
        <label class="form-label fw-bold">Internal Information</label>
            <div class="mx-1">
                <label for="new-client-tier" class="form-label text-dark">Client Tier</label>
                <select id="new-client-tier" class="form-select" name="new-client-tier" aria-label="Tier Select">
                    <option selected>Select Tier</option>
                    <option value="STANDARD">Standard</option>
                    <option value="PREMIUM">Premium</option>
                    <option value="PRIVATE_BANKING">Private Banking</option>
                </select>
            </div>
            
        </div>
    </div>
</div>
<div class="container-fluid">
    <div class="row mb-3 justify-content-center">
        <div class="col-3"> 
            <div class="mx-1"> 
                <label for="new-client-last" class="form-label text-dark">Client Last Name</label>
                <input type="text" class="form-control" id="new-client-last" name="new-client-last" placeholder="ex: &quot;Smith&quot;">
            </div>
        </div>

        <div class="col-3">
            <div class="mx-1"> 
                <label for="new-client-email" class="form-label text-dark">Client Email</label>
                <input type="text" class="form-control" id="new-client-email" name="new-client-email" placeholder="jsmith@example.com">
            </div>
            
        </div>
        <div class="col-3">
            
            <div class="mx-1">
                <label for="new-net-worth" class="form-label text-dark">Client Net Worth</label>
                <select id="new-net-worth" class="form-select" name="new-net-worth" aria-label="Net Worth Form Select">
                    <option selected>Select Range of Net Worth</option>
                    <option value="UNDER_500K"><$500K</option> 
                    <option value="BETWEEN_500K_2M">$500K-$2M</option>
                    <option value="BETWEEN_2M_10M">$2M-$10M</option>
                    <option value="OVER_10M">$10M+</option>
                </select>
            </div>
        </div>       
    </div>
</div>
<div class="container-fluid">
    <div class="row justify-content-center">
        <div class="col-2 ">
            <button type="submit" class="btn btn-success mx-1" id="client-submit-button">Submit</button>
        </div>
    </div>
</div>
    </form>
    
        <!-- including bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
