<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- including scripts -->
    <script src="../../scripts/components.js" defer></script>
    <script src="../../scripts/addEditPages/addEditEngagement.js" defer></script>
    <title>Add New Engagement</title>
</head>
<body>
    <main-header></main-header>
    <form id="engagement-form" action="#">  <!-- forms naturally try to redirect you, so use # action to prevent. Or give it a page to redirect you to -->

  <h3 class="h3 p-4 text-dark text-center" id="form-header">New Engagement</h3>
<div class="container-fluid">
    <div class="row mb-3 justify-content-center">

        <div class="col-3">

            <div class="mx-1"> <!-- TODO: figure out way to retrieve client or add new one -->
                    <label class="form-label text-dark">Client</label>
                    <div class="input-group" > <!-- omg this is awesome https://getbootstrap.com/docs/4.0/components/input-group/ -->
                        <input 
                            type="text" 
                            class="form-control" 
                            id="selected-client-display"
                            placeholder="No client selected"
                            readonly
                        >

                        <button class="btn btn-outline-primary" type="button"
                                id="open-client-modal-btn"
                                onclick="loadClientModal()"
                            >
                            Select
                        </button>
                    </div>
            </div>

        </div>
        <div class="col-4">

            <div class="mx-1"> <!-- TODO: figure out way to retrieve client or add new one -->
                    <label class="form-label text-dark">Advisory Service</label>
                    <div class="input-group" >
                        <input 
                            type="text" 
                            class="form-control" 
                            id="selected-advisory-display"
                            placeholder="No advisory service selected"
                            readonly
                        >

                        <button class="btn btn-outline-primary" type="button"
                                id="open-advisory-modal-btn"
                                onclick="loadAdvisoryModal()"
                                >
                                
                            Select
                        </button>
                    </div>
            </div>
        </div>
        <div class="col-2">

            <div class="mx-1"> 
                <label for="new-start-date" class="form-label text-dark">Engagement Start Date</label>
                <input type="date" class="form-control" id="new-start-date" name="new-start-date" placeholder="mm/dd/yyyy">
            </div>
        </div>
    </div>
</div>
<div class="container-fluid">
    <div class="row mb-3 justify-content-center">
        <div class="col-2">

            <div class="mx-1">
                <label for="new-engagement-status" class="form-label text-dark">Engagement Status</label>
                <select id="new-engagement-status" class="form-select" name="new-engagement-status" aria-label="Engagement Status Form Select">
                    <option selected>Select Status</option>
                    <option value="ACTIVE">Active</option> 
                    <option value="PAUSED">Paused</option>
                    <option value="COMPLETED">Completed</option>
                </select>
            </div>
        </div>
        <div class="col-8">
            
            <div class="mx-1"> 
                <label for="new-notes" class="form-label text-dark">Notes</label>
                <input type="text" class="form-control" id="new-notes" name="new-notes" placeholder="Any extra info here...">
            </div>
        </div>
    </div>
</div>
<div class="container-fluid">
  <div class="row justify-content-center">
      <div class="col-2">
          <button type="submit" class="btn btn-success mx-1" id="engagement-submit-button">Submit</button>
      </div>
  </div>
</div>
</form>


    <div class="modal" id="client-modal">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content">
            <div class="modal-header" style="font-size: 2rem">Choose the client that is part of the engagement.</div>
            <div class="modal-body" id="delete-modal-body">
                <table class="table table-hover">
                    <tbody id="client-select-table"></tbody>
                </table>
            </div>
            <div class="modal-footer">
                <button id="cancel-client-btn" class="btn btn-secondary cancel-btn">Cancel</button>
            </div>
            </div>
        </div>
    </div>

        <div class="modal" id="advisory-modal">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
            <div class="modal-header" style="font-size: 2rem">Choose the advisory service that is part of the engagement.</div>
            <div class="modal-body" id="advisory-modal-body">
                <table class="table table-hover">
                    <tbody id="advisory-select-table"></tbody>
                </table>
            </div>
            <div class="modal-footer">
                <button id="cancel-advisory-btn" class="btn btn-secondary cancel-btn">Cancel</button>
            </div>
            </div>
        </div>
    </div>


    
        <!-- including bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
