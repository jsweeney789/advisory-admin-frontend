<!DOCTYPE html>
<html lang="en">
<head>
    <!-- TODO: META STYFF-->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- including bootstrap CSS --> <!-- TODO: implement better way of doing this for all pages -->
     <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- including scripts -->
    <script src="../../scripts/components.js" defer></script>
    <script src="../../scripts/dashboards/engagementDashboard.js" defer></script>
    <title>Advisory Admin</title>
</head>
<body>
    <main-header></main-header>

    <h3 class="h3 p-4 text-dark text-center" id="form-header" style="margin-top: 3%;">Engagements Dashboard</h3>

    <div class="container">
        <div class ="row" style="margin-top: 2%">
            <!-- Add new engagement button -->
            <div class="col-10">
                <div class="search-wrapper">
                    <label for="search">Search Engagements</label>
                    <input type="search" id="search" data-search class="form-control">
                </div>
            </div>

            <div class = "col-1">
                <a href="../addEditPages/addEditEngagement.html"> <!-- TODO: for now this goes to the html, it should go to the actual page or something somehow later idfk-->
                    <button type="button" class="btn btn-success">Add Engagement</button>
                </a>
            </div>
        </div>
    </div>

    <!-- ENGAGEMENT TABLE -->
    <div class="container-fluid">
        <div class="row justify-content-center">
            <div class="col-md-11">
                <!-- Tables - easy way to display info -->
                <table id="engagements-table" class="table  table-light table-hover my-5">
                    <thead class="text-center">
                        <tr>
                            <th>Advisory</th> <!-- name of related advisory, should also link to the single item view of the client -->
                            <th>Client</th> <!-- first/last of client, should also link to the single item view of the client -->
                            <th>Start Date</th> 
                            <th>Status</th>
                            <th>Notes</th>
                            <th>Edit</th>
                            <th>Delete</th>
                            <!-- worth considering adding annual fee as that would be decided by the advisory service being used in the engagement -->
                            <!-- worth considering adding a relevant contact info for the client, maybe allow a preferred one to be selected between phone and email-->
                        </tr>
                    </thead>
                    <tbody id="engagements-table-body" class="text-center">
                        <!-- data will be added by the JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="modal" id="delete-modal">
        <div class="modal-dialog">
            <div class="modal-content">
            <div class="modal-header" style="font-size: 2rem">Confirm Delete</div>
            <div class="modal-body" id="delete-modal-body">Are you sure?</div>
            <div class="modal-footer">
                <button id="cancel-delete-btn" class="btn btn-secondary">Cancel</button>
                <button id="confirm-delete-btn" class="btn btn-danger">Delete</button>
            </div>
            </div>
        </div>
    </div>


    <!-- including bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
