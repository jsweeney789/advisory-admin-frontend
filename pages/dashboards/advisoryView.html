<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- including scripts -->
    <script src="../../scripts/components.js" defer></script>
    <script src="../../scripts/dashboards/advisoryDashboard.js" defer></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <title>Services</title>
</head>
<body>
    <main-header></main-header>

    <h3 class="h3 p-4 text-dark text-center" id="form-header" style="margin-top: 3%">Advisory Service Dashboard</h3>

    <!-- Add new advisory button and search bar -->
     <div class="container-fluid">
        <div class="row justify-content-center" style="margin-top: 2%">
            <!-- search bar-->
            <div class="col-10">
                <div class="search-wrapper">
                    <label for="search">Search Advisory Services</label>
                    <input type="search" id="search" data-search class="form-control">
                </div>
            </div>
            <div class = "col-1">
                <a href="../addEditPages/addEditAdvisory.html"> <!-- TODO: for now this goes to the html, it should go to the actual page or something somehow later -->
                    <button type="button" class="btn btn-success">Add Service</button>
                </a>
            </div>
        </div>
    </div>
    
    <!-- ADVISORY TABLE -->
     <div class="container-fluid">
        <div class="row justify-content-center">
            <div class="col-md-11">
                <!-- Tables - easy way to display info -->
                <table id="advisory-table" class="table table-light table-hover my-5">
                    <thead class="text-center">
                        <tr>
                            <th>Info</th>
                            <th>Service Name</th> 
                            <th>Service Type</th> <!-- should be drop down in editor -->
                            <th>Delivery Format</th> <!-- should be drop down in editor -->
                            <th>Annual Fee</th> 
                            <th>Status</th> <!-- could be checkbox in editor? Will look into how to adjust booleans -->
                            <th>Active Clients</th>
                            <th>Edit</th>
                            <th>Delete</th>

                        </tr>
                    </thead>
                    <tbody id="advisory-table-body" class="text-center">
                        <!-- advisory data will be added by the JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="modal" id="delete-modal">
        <div class="modal-dialog">
            <div class="modal-content">
            <div class="modal-header" style="font-size: 2rem">Confirm Delete</div>
            <div class="modal-body" id="delete-modal-body">Are you sure?</div>
            <div class="modal-footer">
                <button id="cancel-delete-btn" class="btn btn-secondary">Cancel</button>
                <button id="confirm-delete-btn" class="btn btn-danger">Delete</button>
            </div>
            </div>
        </div>
    </div>


    <!-- including bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
